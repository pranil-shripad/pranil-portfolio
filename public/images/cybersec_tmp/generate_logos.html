<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>body { margin: 0; padding: 20px; background: #eee; font-family: Arial; } canvas { border: 1px solid #ccc; display: block; margin: 10px 0; } #status { font-size: 20px; color: green; }</style>
</head>
<body>
<h1>Logo Texture Generator</h1>
<p id="status">Generating...</p>
<div id="output"></div>
<script>
const tools = [
  { name: 'wireshark', text: 'Wireshark', color: '#1679A7', svg: 'wireshark.svg' },
  { name: 'burpsuite', text: 'Burp Suite', color: '#FF6633', svg: 'burpsuite.svg' },
  { name: 'kalilinux', text: 'Kali Linux', color: '#557C94', svg: 'kalilinux.svg' },
  { name: 'metasploit', text: 'Metasploit', color: '#2596CD', svg: 'metasploit.svg' },
  { name: 'hackthebox', text: 'HackTheBox', color: '#9FEF00', svg: 'hackthebox.svg' },
];

async function loadSvgAsImage(svgPath, color) {
  const resp = await fetch(svgPath);
  let svgText = await resp.text();
  const blob = new Blob([svgText], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = url;
  });
}

async function generateTexture(tool) {
  const W = 1400, H = 900;
  const canvas = document.createElement('canvas');
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');

  // White background
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);

  const img = await loadSvgAsImage(tool.svg, tool.color);
  
  const positions = [
    { x: W * 0.25, y: H * 0.35 },
    { x: W * 0.75, y: H * 0.35 },
  ];

  const iconSize = 200;

  positions.forEach(pos => {
    if (img) {
      ctx.drawImage(img, pos.x - iconSize/2, pos.y - iconSize/2, iconSize, iconSize);
    }
    
    // Draw text below icon
    ctx.fillStyle = tool.color;
    ctx.font = 'bold 52px Arial, Helvetica, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(tool.text, pos.x, pos.y + iconSize/2 + 25);
  });

  return canvas;
}

async function generateAll() {
  const output = document.getElementById('output');
  const results = [];
  
  for (const tool of tools) {
    const canvas = await generateTexture(tool);
    
    // Show preview
    const div = document.createElement('div');
    div.innerHTML = `<h3>${tool.text}</h3>`;
    canvas.style.width = '700px';
    canvas.style.height = '450px';
    div.appendChild(canvas);
    output.appendChild(div);

    // Get as blob
    const blob = await new Promise(r => canvas.toBlob(r, 'image/webp', 0.92));
    results.push({ name: tool.name, blob });
  }

  // Auto-download each
  for (const r of results) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(r.blob);
    a.download = `${r.name}.webp`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    await new Promise(resolve => setTimeout(resolve, 300));
  }

  document.getElementById('status').textContent = `Done! ${results.length} files downloaded.`;
}

generateAll();
</script>
</body>
</html>
